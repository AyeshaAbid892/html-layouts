<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Form - freeCodeCamp</title>
</head>
<body bgcolor="#a2dad2" style="font-family: Arial, sans-serif; margin: 0; padding: 40px 10px;">

  <h1 align="center" style="margin-top: 0; margin-bottom: 20px; font-size: 2.2em; font-weight: normal; color: #111111;">Survey Form</h1>

  <table width="1050px" bgcolor="#ffffff" cellspacing="0" cellpadding="40" align="center" style="border-radius: 5px; box-shadow: 0px 2px 10px rgba(0,0,0,0.05);">
    <tr>
      <td>

        <p align="center" style="font-size: 1.1em; color: #333333; margin-top: 0; margin-bottom: 35px;">
          Let us know how we can improve freeCodeCamp
        </p>

        <form action="/submit-survey" method="POST">
          
          <table width="100%" cellspacing="0" cellpadding="12" border="0">
            
            <tr>
              <td width="42%" align="right" valign="middle">
                <label for="name">* Name:</label>
              </td>
              <td width="58%" align="left" valign="middle">
                <input type="text" id="name" placeholder="Enter your name" required style="width: 350px; padding: 6px; border: 1px solid #cccccc; border-radius: 3px;">
              </td>
            </tr>

            <tr>
              <td align="right" valign="middle">
                <label for="email">* Email:</label>
              </td>
              <td align="left" valign="middle">
                <input type="email" id="email" placeholder="Enter your Email" required style="width: 350px; padding: 6px; border: 1px solid #cccccc; border-radius: 3px;">
              </td>
            </tr>

            <tr>
              <td align="right" valign="middle">
                <label for="age">* Age:</label>
              </td>
              <td align="left" valign="middle">
                <input type="number" id="age" placeholder="Age" min="1" max="120" required style="width: 350px; padding: 6px; border: 1px solid #cccccc; border-radius: 3px;">
              </td>
            </tr>

            <tr>
              <td align="right" valign="middle">
                <label for="role">Which option best describes your current role?</label>
              </td>
              <td align="left" valign="middle">
                <select id="role" style="width: 140px; padding: 5px; border: 1px solid #cccccc; border-radius: 3px; background-color: #efefef;">
                  <option value="student">Student</option>
                  <option value="job">Full Time Job</option>
                  <option value="learner">Full Time Learner</option>
                  <option value="preferNo">Prefer not to say</option>
                  <option value="other">Other</option>
                </select>
              </td>
            </tr>

            <tr>
              <td align="right" valign="top" style="padding-top: 15px;">
                <label>* How likely is that you would recommend<br>freeCodeCamp to a friend?</label>
              </td>
              <td align="left" valign="top" style="padding-top: 15px;">
                <input type="radio" id="recom-definitely" name="recommendation" value="definitely" checked>
                <label for="recom-definitely">Definitely</label>
                <br><br>
                <input type="radio" id="recom-maybe" name="recommendation" value="maybe">
                <label for="recom-maybe">Maybe</label>
                <br><br>
                <input type="radio" id="recom-notsure" name="recommendation" value="notsure">
                <label for="recom-notsure">Not sure</label>
              </td>
            </tr>

            <tr>
              <td align="right" valign="middle">
                <label for="most-liked">What do you like most in FCC:</label>
              </td>
              <td align="left" valign="middle">
                <select id="most-liked" style="width: 160px; padding: 5px; border: 1px solid #cccccc; border-radius: 3px; background-color: #efefef;">
                  <option value="" disabled selected>Select an option</option>
                  <option value="challenges">Challenges</option>
                  <option value="projects">Projects</option>
                  <option value="community">Community</option>
                  <option value="openSource">Open Source</option>
                </select>
              </td>
            </tr>

            <tr>
              <td align="right" valign="top" style="padding-top: 15px;">
                <label>Things that should be improved in the future<br><font size="2">(Check all that apply):</font></label>
              </td>
              <td align="left" valign="top" style="padding-top: 15px;">
                <input type="checkbox" id="imp-frontend" name="improvement" value="frontend">
                <label for="imp-frontend">Front-end Projects</label>
                <br><br>
                <input type="checkbox" id="imp-backend" name="improvement" value="backend">
                <label for="imp-backend">Back-end Projects</label>
                <br><br>
                <input type="checkbox" id="imp-data" name="improvement" value="data">
                <label for="imp-data">Data Visualization</label>
              </td>
            </tr>

          </table>
        </form>

      </td>
    </tr>
  </table>

</body>
</html>
